name: runanywhere_starter
description: A comprehensive starter app demonstrating RunAnywhere SDK capabilities - on-device AI for Flutter.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # RunAnywhere SDK packages (remote from pub.dev)
  runanywhere: 0.16.0
  runanywhere_llamacpp: 0.16.0
  runanywhere_onnx: 0.16.0

  # UI and Icons
  cupertino_icons: ^1.0.6
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  
  # State management
  provider: ^6.1.2
  
  # Utilities
  intl: ^0.19.0
  http: ^1.2.0

  # Image picker
  image_picker: ^1.0.7

  # OCR
  google_mlkit_text_recognition: ^0.13.0

  # Permissions
  permission_handler: ^11.3.0

flutter:
  uses-material-design: true
